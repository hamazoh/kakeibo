<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家計簿メモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 16px;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #185FA5;
    }

    /* フォーム */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      color: #555;
      margin-bottom: 2px;
      display: block;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      background: #fafafa;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    input:focus {
      border-color: #185FA5;
      background: #fff;
    }

    .btn-add {
      width: 100%;
      height: 48px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .btn-add:active { opacity: 0.85; }

    /* リスト */
    .list-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .list-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .empty-msg {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 12px;
      color: #888;
      font-weight: 600;
      text-align: left;
      padding: 0 6px 8px;
      border-bottom: 1px solid #eee;
    }

    thead th:last-child { white-space: nowrap; text-align: center; }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 10px 6px;
      vertical-align: top;
      font-size: 15px;
    }

    .td-date { white-space: nowrap; color: #555; font-size: 14px; }

    .td-amount { text-align: right; white-space: nowrap; }

    .amount-total { font-weight: 600; }

    .amount-detail {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
      word-break: break-all;
    }

    .td-item { width: 99%; }

    .item-name { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 10px;
      padding: 1px 7px;
      white-space: nowrap;
      font-weight: 600;
    }

    /* アクションボタン列 */
    .td-actions {
      white-space: nowrap;
      vertical-align: middle;
      text-align: center;
    }

    .btn-delete,
    .btn-edit {
      background: none;
      border: none;
      color: #bbb;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 5px;
      line-height: 1;
      border-radius: 4px;
      display: block;
    }

    .btn-delete:active { color: #e33; }
    .btn-edit:active   { color: #185FA5; }

    /* 編集行 */
    .edit-row td { padding: 6px 3px; vertical-align: middle; }

    .edit-row input[type="date"],
    .edit-row input[type="number"],
    .edit-row input[type="text"] {
      height: 32px;
      padding: 0 4px;
      font-size: 13px;
      width: 100%;
      min-width: 0;
    }

    .edit-btns { display: flex; flex-direction: column; gap: 4px; }

    .btn-edit-save {
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-edit-cancel {
      background: #f0f0f0;
      color: #555;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      padding: 5px 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-edit-save:active  { opacity: 0.85; }
    .btn-edit-cancel:active { opacity: 0.85; }

    .total-row {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #eee;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .total-label { color: #555; font-weight: 600; }

    .total-amount { color: #185FA5; font-size: 20px; }

    /* コピーボタン */
    .btn-copy {
      width: 100%;
      height: 48px;
      background: #fff;
      color: #185FA5;
      border: 2px solid #185FA5;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-copy:active { background: #e8f0fb; }

    /* オーバーレイ＆ダイアログ */
    .overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      min-height: 100%;
      background: rgba(0,0,0,0.45);
      justify-content: center;
      align-items: flex-start;
      padding-top: 120px;
      z-index: 100;
    }

    .overlay.active { display: flex; }

    .dialog {
      background: #fff;
      border-radius: 14px;
      padding: 24px 20px 20px;
      width: calc(100% - 48px);
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .dialog h2 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #222;
    }

    .dialog-info {
      font-size: 14px;
      color: #444;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .dialog-warn {
      font-size: 13px;
      color: #b00;
      margin-bottom: 20px;
    }

    .dialog-btns {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      height: 46px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm-delete {
      flex: 1;
      height: 46px;
      background: #A32D2D;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm-delete:active { opacity: 0.85; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.88);
      color: #fff;
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 200;
    }

    .toast.show { opacity: 1; }

    /* ラッパー（overlayのposition: absoluteの基準） */
    #app {
      position: relative;
    }

    /* ローディング */
    .loading-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      min-height: 100%;
      background: rgba(255,255,255,0.7);
      justify-content: center;
      align-items: flex-start;
      padding-top: 160px;
      z-index: 150;
    }

    .loading-overlay.active { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 保存ステータス */
    .sync-status {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }

    .sync-status.error { color: #b00; }

    /* プルトゥリフレッシュ */
    .ptr-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      color: #888;
      background: #e8f0fb;
      transform: translateY(-100%);
      transition: transform 0.2s ease;
      z-index: 50;
      pointer-events: none;
      user-select: none;
    }

    .ptr-bar.visible  { transform: translateY(0); }
    .ptr-bar.ready    { color: #185FA5; font-weight: 600; }
    .ptr-bar.loading  { color: #185FA5; }
  </style>
</head>
<body>
<!-- プルトゥリフレッシュバー -->
<div class="ptr-bar" id="ptr-bar">↓ 引っ張って更新</div>

<div id="app">
  <div class="container">
    <h1>家計簿メモ</h1>

    <!-- 入力フォーム -->
    <div class="form-card">
      <div class="form-row">
        <div>
          <label for="input-date">日付</label>
          <input type="date" id="input-date">
        </div>
        <div>
          <label for="input-amount">支出（円）</label>
          <input type="number" id="input-amount" inputmode="numeric" min="1" placeholder="例: 800">
        </div>
        <div>
          <label for="input-item">項目</label>
          <input type="text" id="input-item" placeholder="例: 昼飯">
        </div>
      </div>
      <button class="btn-add" id="btn-add">追加する</button>
      <div class="sync-status" id="sync-status"></div>
    </div>

    <!-- リスト -->
    <div class="list-card">
      <div class="list-header">
        <span class="list-title">記録一覧</span>
      </div>
      <div id="list-area"></div>
      <div id="total-area"></div>
    </div>

    <!-- コピーボタン -->
    <button class="btn-copy" id="btn-copy">エクセル用コピー</button>
  </div>

  <!-- ローディング -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- 削除確認ダイアログ -->
  <div class="overlay" id="delete-overlay">
    <div class="dialog">
      <h2>削除の確認</h2>
      <p class="dialog-info" id="delete-dialog-info"></p>
      <p class="dialog-warn">この操作は元に戻せません。</p>
      <div class="dialog-btns">
        <button class="btn-cancel" id="delete-btn-cancel">キャンセル</button>
        <button class="btn-confirm-delete" id="delete-btn-confirm">削除</button>
      </div>
    </div>
  </div>

  <!-- コピーダイアログ -->
  <div class="overlay" id="overlay">
    <div class="dialog">
      <h2>エクセル用コピーして削除</h2>
      <p class="dialog-info" id="dialog-info"></p>
      <p class="dialog-warn">この操作は元に戻せません。</p>
      <div class="dialog-btns">
        <button class="btn-cancel" id="btn-cancel">キャンセル</button>
        <button class="btn-confirm-delete" id="btn-confirm-delete">コピーして削除</button>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbycNsvJQ9KZkEp22_dySkuUDuaBDEE7wFReKE7mUC_qti_Cj929-82Huj32RN6IbDxZuA/exec';
  const LS_KEY      = 'kakeibo_cache';
  const LS_VER_KEY  = 'kakeibo_version';
  const CACHE_VER   = '2';

  // インメモリキャッシュ
  let cachedData = [];

  // GETリクエストの世代番号（古いレスポンスを無視するためのカウンター）
  let getGeneration = 0;

  // --- localStorage ---
  function saveToLS(data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadFromLS() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  // --- JSONP共通関数 ---
  function apiCall(params) {
    return new Promise((resolve, reject) => {
      const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      let settled = false;

      const cleanup = () => {
        if (window[callbackName]) delete window[callbackName];
        if (script.parentNode) document.body.removeChild(script);
      };

      const timer = setTimeout(() => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error('JSONP timeout'));
      }, 15000);

      window[callbackName] = (data) => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        cleanup();
        reject(new Error('JSONP script load error'));
      };

      const query = Object.entries({ ...params, callback: callbackName })
        .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
        .join('&');

      script.src = API_URL + '?' + query;
      console.log('apiCall:', script.src);
      document.body.appendChild(script);
    });
  }

  // --- ローディング ---
  function setLoading(on) {
    document.getElementById('loading-overlay').classList.toggle('active', on);
  }

  // --- マージキー: "YYYY-MM_項目名" ---
  function mergeKey(dateStr, item) {
    return dateStr.slice(0, 7) + '_' + item.trim();
  }

  // --- 日付フォーマット ---
  function formatDate(dateStr) {
    const [, m, d] = dateStr.split('-');
    return `${parseInt(m)}月${parseInt(d)}日`;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- UI ---
  function renderList(data) {
    const listArea  = document.getElementById('list-area');
    const totalArea = document.getElementById('total-area');

    if (data.length === 0) {
      listArea.innerHTML = '<p class="empty-msg">まだデータがありません</p>';
      totalArea.innerHTML = '';
      return;
    }

    let total = 0;
    let rows = '';

    data.forEach((row) => {
      const sum = row.amounts.reduce((a, b) => a + b, 0);
      total += sum;

      const detailHtml = row.amounts.length >= 2
        ? `<div class="amount-detail">${row.amounts.map(a => '¥' + a.toLocaleString()).join('+')}</div>`
        : '';

      const badgeHtml = row.amounts.length >= 2
        ? `<span class="badge">${row.amounts.length}件</span>`
        : '';

      rows += `
        <tr data-key="${escHtml(row.key)}">
          <td class="td-date">${formatDate(row.date)}</td>
          <td class="td-amount">
            <div class="amount-total">¥${sum.toLocaleString()}</div>
            ${detailHtml}
          </td>
          <td class="td-item">
            <div class="item-name">${escHtml(row.item)}${badgeHtml}</div>
          </td>
          <td class="td-actions">
            <button class="btn-edit"   data-key="${escHtml(row.key)}"  aria-label="編集">✏</button>
            <button class="btn-delete" data-date="${escHtml(row.date)}" data-item="${escHtml(row.item)}" aria-label="削除">✕</button>
          </td>
        </tr>`;
    });

    listArea.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>日付</th>
            <th style="text-align:right">支出</th>
            <th>項目</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    totalArea.innerHTML = `
      <div class="total-row">
        <span class="total-label">合計</span>
        <span class="total-amount">¥${total.toLocaleString()}</span>
      </div>`;

    listArea.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => confirmDelete(btn.dataset.date, btn.dataset.item));
    });

    listArea.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', () => editRow(btn.dataset.key));
    });
  }

  // --- インライン編集 ---
  function editRow(key) {
    const row = cachedData.find(r => r.key === key);
    if (!row) return;
    const tr = document.querySelector(`tr[data-key="${CSS.escape(key)}"]`);
    if (!tr) return;

    const sum = row.amounts.reduce((a, b) => a + b, 0);
    tr.classList.add('edit-row');
    tr.innerHTML = `
      <td><input type="date"   class="edit-date"   value="${escHtml(row.date)}"></td>
      <td><input type="number" class="edit-amount" inputmode="numeric" value="${sum}" min="1"></td>
      <td><input type="text"   class="edit-item"   value="${escHtml(row.item)}"></td>
      <td>
        <div class="edit-btns">
          <button class="btn-edit-save">保存</button>
          <button class="btn-edit-cancel">×</button>
        </div>
      </td>`;

    tr.querySelector('.edit-item').focus();

    tr.querySelector('.btn-edit-save').addEventListener('click', () => {
      const newDate   = tr.querySelector('.edit-date').value;
      const newAmount = parseInt(tr.querySelector('.edit-amount').value);
      const newItem   = tr.querySelector('.edit-item').value.trim();
      saveEdit(key, row.date, row.item, newDate, newItem, newAmount);
    });

    tr.querySelector('.btn-edit-cancel').addEventListener('click', () => {
      renderList(cachedData);
    });

    tr.querySelectorAll('input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  tr.querySelector('.btn-edit-save').click();
        if (e.key === 'Escape') renderList(cachedData);
      });
    });
  }

  async function saveEdit(key, oldDate, oldItem, newDate, newItem, newAmount) {
    if (!newDate)                     { showToast('日付を入力してください'); return; }
    if (!newAmount || newAmount <= 0) { showToast('正しい金額を入力してください'); return; }
    if (!newItem)                     { showToast('項目を入力してください'); return; }

    // 変更前の状態を保存（エラー時のリバート用）
    const prevData = JSON.parse(JSON.stringify(cachedData));

    const newKey = mergeKey(newDate, newItem);
    const idx    = cachedData.findIndex(r => r.key === key);
    if (idx === -1) return;

    const conflictIdx = cachedData.findIndex((r, i) => r.key === newKey && i !== idx);
    if (conflictIdx !== -1) {
      cachedData[conflictIdx].amounts = [...cachedData[conflictIdx].amounts, newAmount];
      cachedData.splice(idx, 1);
    } else {
      cachedData[idx] = { key: newKey, date: newDate, item: newItem, amounts: [newAmount] };
    }

    // 楽観的更新
    saveToLS(cachedData);
    renderList(cachedData);
    showToast('更新しました');

    // 進行中のGETレスポンスを無効化（レースコンディション防止）
    getGeneration++;

    setSyncStatus('saving');
    try {
      await apiCall({ action: 'delete', date: oldDate, item: oldItem });
      await apiCall({ action: 'add',    date: newDate, item: newItem, amounts: String(newAmount) });
      setSyncStatus('done');
      // GASから再取得してlocalStorageと整合性を保つ
      refreshFromGAS();
    } catch(e) {
      // GAS失敗時はlocalStorageを元に戻す
      cachedData = prevData;
      saveToLS(cachedData);
      renderList(cachedData);
      setSyncStatus('error');
      showToast('更新の保存に失敗しました: ' + e.message);
    }
  }

  // --- 削除確認 ---
  let pendingDelete = null;

  function confirmDelete(date, item) {
    pendingDelete = { date, item };
    document.getElementById('delete-dialog-info').textContent = `「${item}」を削除しますか？`;
    document.getElementById('delete-overlay').classList.add('active');
  }

  document.getElementById('delete-btn-cancel').addEventListener('click', () => {
    document.getElementById('delete-overlay').classList.remove('active');
    pendingDelete = null;
  });

  document.getElementById('delete-btn-confirm').addEventListener('click', async () => {
    document.getElementById('delete-overlay').classList.remove('active');
    if (!pendingDelete) return;
    const { date, item } = pendingDelete;
    pendingDelete = null;

    // 変更前の状態を保存（エラー時のリバート用）
    const prevData = JSON.parse(JSON.stringify(cachedData));

    // 楽観的削除（UIを即座に更新）
    cachedData = cachedData.filter(r => !(r.date === date && r.item === item));
    saveToLS(cachedData);
    renderList(cachedData);
    showToast('削除中...');

    // 進行中のGETレスポンスを無効化（レースコンディション防止）
    getGeneration++;

    try {
      await apiCall({ action: 'delete', date, item });
      showToast(`「${item}」を削除しました`);
      // GASから再取得してlocalStorageと整合性を保つ
      refreshFromGAS();
    } catch(e) {
      // GAS失敗時はlocalStorageを元に戻す
      cachedData = prevData;
      saveToLS(cachedData);
      renderList(cachedData);
      showToast('削除に失敗しました: ' + e.message);
    }
  });

  document.getElementById('delete-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('delete-overlay')) {
      document.getElementById('delete-overlay').classList.remove('active');
      pendingDelete = null;
    }
  });

  // --- トースト ---
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // --- GASの二次元配列 → cachedData形式に変換 ---
  function parseRows(rows) {
    console.log('parseRows input:', JSON.stringify(rows));
    if (!Array.isArray(rows) || rows.length === 0) return [];
    if (rows.length === 1 && (!Array.isArray(rows[0]) || rows[0].length === 0)) return [];

    const rowMap = {};
    const order  = [];

    rows.forEach((row, i) => {
      try {
        if (!Array.isArray(row) || row.length < 3) {
          console.log(`parseRows: row[${i}] skipped (insufficient columns)`, row);
          return;
        }
        let dateStr = String(row[0]).trim();
        const item  = String(row[1]).trim();

        // 各種日付形式を "YYYY-MM-DD" に正規化
        if (/^\d{4}-\d{2}-\d{2}T/.test(dateStr)) {
          // ISO datetime: "2026-03-23T00:00:00.000Z" → "2026-03-23"
          dateStr = dateStr.slice(0, 10);
        } else if (/^\d{4}\/\d{2}\/\d{2}/.test(dateStr)) {
          // YYYY/MM/DD → YYYY-MM-DD
          dateStr = dateStr.slice(0, 10).replace(/\//g, '-');
        } else if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
          // "Mon Mar 23 2026 00:00:00 GMT+0900 (日本標準時)" 等のDate.toString()形式
          const d = new Date(dateStr);
          if (!isNaN(d.getTime())) {
            // タイムゾーンオフセットを文字列から抽出して正確に変換
            const tzMatch = dateStr.match(/GMT([+-])(\d{2})(\d{2})/);
            const offsetMin = tzMatch
              ? (tzMatch[1] === '+' ? 1 : -1) * (parseInt(tzMatch[2]) * 60 + parseInt(tzMatch[3]))
              : 0;
            const adj = new Date(d.getTime() + offsetMin * 60000);
            dateStr = `${adj.getUTCFullYear()}-${String(adj.getUTCMonth()+1).padStart(2,'0')}-${String(adj.getUTCDate()).padStart(2,'0')}`;
          }
        }

        // 最終バリデーション（ヘッダー行など不正値を除外）
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
          console.log(`parseRows: row[${i}] skipped (invalid date: ${dateStr})`, row);
          return;
        }
        if (!item) {
          console.log(`parseRows: row[${i}] skipped (empty item)`, row);
          return;
        }

        // amounts: 数値（新形式）or "500+800" 文字列（旧形式）の両方を処理
        const rawAmount = row[2];
        let amounts;
        if (typeof rawAmount === 'number') {
          amounts = !isNaN(rawAmount) && rawAmount > 0 ? [rawAmount] : [];
        } else {
          const detailStr = String(rawAmount).trim();
          amounts = detailStr.split('+').map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n > 0);
        }
        if (amounts.length === 0) {
          console.log(`parseRows: row[${i}] skipped (no valid amounts)`, row);
          return;
        }
        const key = mergeKey(dateStr, item);

        if (rowMap[key]) {
          rowMap[key].amounts = rowMap[key].amounts.concat(amounts);
        } else {
          rowMap[key] = { key, date: dateStr, item, amounts };
          order.push(key);
        }
      } catch (e) {
        console.log(`parseRows: row[${i}] skipped (error)`, e, row);
      }
    });
    const result = order.map(k => rowMap[k]);
    console.log('parseRows result:', result);
    return result;
  }

  // --- 保存ステータス ---
  let syncTimer = null;
  function setSyncStatus(state) {
    const el = document.getElementById('sync-status');
    if (state === 'saving') {
      el.textContent = '保存中...';
      el.className = 'sync-status';
      if (syncTimer) clearTimeout(syncTimer);
    } else if (state === 'done') {
      el.textContent = '';
      el.className = 'sync-status';
    } else if (state === 'error') {
      el.textContent = '保存失敗';
      el.className = 'sync-status error';
    }
  }

  // --- GASからバックグラウンドで再取得（常にlocalStorageを上書き） ---
  async function refreshFromGAS() {
    const myGen = ++getGeneration;
    try {
      const raw = await apiCall({ action: 'get' });
      if (myGen !== getGeneration) {
        console.log('refreshFromGAS: stale response discarded (gen mismatch)');
        return;
      }
      console.log('refreshFromGAS raw:', JSON.stringify(raw));
      cachedData = parseRows(raw);
      saveToLS(cachedData);
      renderList(cachedData);
    } catch(e) {
      if (myGen !== getGeneration) return;
      console.error('Background refresh failed:', e);
      showToast('データの更新に失敗しました');
    }
  }

  // --- データ取得（フルローディング付き・常にGASから取得） ---
  async function fetchAndRender() {
    const myGen = ++getGeneration;
    setLoading(true);
    try {
      const raw = await apiCall({ action: 'get' });
      if (myGen !== getGeneration) {
        console.log('fetchAndRender: stale response discarded (gen mismatch)');
        return;
      }
      console.log('fetchAndRender raw:', JSON.stringify(raw));
      cachedData = parseRows(raw);
      saveToLS(cachedData);
      renderList(cachedData);
    } catch (e) {
      if (myGen !== getGeneration) return;
      console.error('fetchAndRender error:', e);
      showToast('データの取得に失敗しました');
    } finally {
      setLoading(false);
    }
  }

  // --- 追加 ---
  document.getElementById('btn-add').addEventListener('click', async () => {
    const dateEl   = document.getElementById('input-date');
    const amountEl = document.getElementById('input-amount');
    const itemEl   = document.getElementById('input-item');

    const dateVal   = dateEl.value;
    const amountVal = parseInt(amountEl.value);
    const itemVal   = itemEl.value.trim();

    if (!dateVal)                      { showToast('日付を入力してください'); return; }
    if (!amountVal || amountVal <= 0)  { showToast('正しい金額を入力してください'); return; }
    if (!itemVal)                      { showToast('項目を入力してください'); return; }

    const key     = mergeKey(dateVal, itemVal);
    const isMerge = cachedData.some(r => r.key === key);

    // 楽観的更新
    const existing = cachedData.find(r => r.key === key);
    if (existing) {
      existing.amounts = [...existing.amounts, amountVal];
    } else {
      cachedData = [...cachedData, { key, date: dateVal, item: itemVal, amounts: [amountVal] }];
    }
    saveToLS(cachedData);
    renderList(cachedData);

    amountEl.value = '';
    itemEl.value   = '';
    amountEl.focus();
    if (isMerge) showToast(`「${itemVal}」にマージしました`);

    // 進行中のGETレスポンスを無効化（レースコンディション防止）
    getGeneration++;

    setSyncStatus('saving');
    try {
      await apiCall({ action: 'add', date: dateVal, item: itemVal, amounts: String(amountVal) });
      setSyncStatus('done');
      refreshFromGAS();
    } catch (e) {
      setSyncStatus('error');
      showToast('保存に失敗しました: ' + e.message);
    }
  });

  // Enterキーで追加
  ['input-amount', 'input-item'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
  });

  // --- コピーダイアログ ---
  document.getElementById('btn-copy').addEventListener('click', () => {
    if (cachedData.length === 0) { showToast('データがありません'); return; }
    const total = cachedData.reduce((s, r) => s + r.amounts.reduce((a, b) => a + b, 0), 0);
    document.getElementById('dialog-info').textContent =
      `${cachedData.length}件・合計 ¥${total.toLocaleString()} をコピーします。`;
    document.getElementById('overlay').classList.add('active');
  });

  document.getElementById('btn-cancel').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('active');
  });

  document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
    const tsv = cachedData.map(r => {
      const sum = r.amounts.reduce((a, b) => a + b, 0);
      return `${formatDate(r.date)}\t¥${sum.toLocaleString()}\t${r.item}`;
    }).join('\n');

    document.getElementById('overlay').classList.remove('active');

    try {
      await copyToClipboard(tsv);
    } catch {
      alert('クリップボードへのコピーに失敗しました。');
      return;
    }

    setLoading(true);
    try {
      await apiCall({ action: 'clear' });
      cachedData = parseRows(await apiCall({ action: 'get' }));
      saveToLS(cachedData);
      renderList(cachedData);
      showToast('コピーして削除しました');
    } catch (e) {
      alert('削除に失敗しました。\n' + e.message);
    } finally {
      setLoading(false);
    }
  });

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('active');
    }
  });

  // --- クリップボード ---
  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise((resolve, reject) => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      ok ? resolve() : reject(new Error('execCommand failed'));
    });
  }

  // --- プルトゥリフレッシュ ---
  (function initPTR() {
    const PTR_THRESHOLD = 72; // 引っ張る距離（px）
    const ptrBar = document.getElementById('ptr-bar');

    let ptrStartY    = 0;
    let ptrTracking  = false;
    let ptrTriggered = false;
    let ptrRefreshing = false;

    document.addEventListener('touchstart', e => {
      // ページ最上部にいるときだけ有効
      if (window.scrollY !== 0 || ptrRefreshing) return;
      // 入力欄のタッチは無視
      if (e.target.closest('input, button, .overlay')) return;
      ptrStartY   = e.touches[0].clientY;
      ptrTracking = true;
      ptrTriggered = false;
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!ptrTracking || ptrRefreshing) return;
      const delta = e.touches[0].clientY - ptrStartY;
      if (delta <= 0) {
        ptrBar.classList.remove('visible', 'ready');
        return;
      }
      ptrBar.classList.add('visible');
      if (delta >= PTR_THRESHOLD) {
        ptrBar.textContent  = '↑ 離して更新';
        ptrBar.classList.add('ready');
        ptrTriggered = true;
      } else {
        ptrBar.textContent  = '↓ 引っ張って更新';
        ptrBar.classList.remove('ready');
        ptrTriggered = false;
      }
    }, { passive: true });

    document.addEventListener('touchend', async () => {
      if (!ptrTracking) return;
      ptrTracking = false;

      if (!ptrTriggered) {
        ptrBar.classList.remove('visible', 'ready');
        return;
      }

      // リフレッシュ実行
      ptrRefreshing = true;
      ptrBar.textContent = '更新中...';
      ptrBar.classList.remove('ready');
      ptrBar.classList.add('loading');

      await refreshFromGAS();

      ptrRefreshing = false;
      ptrTriggered  = false;
      ptrBar.classList.remove('visible', 'ready', 'loading');
      ptrBar.textContent = '↓ 引っ張って更新';
    }, { passive: true });
  })();

  // --- 初期化 ---
  document.getElementById('input-date').value = todayStr();

  // バージョンが変わっていたらlocalStorageをクリア
  if (localStorage.getItem(LS_VER_KEY) !== CACHE_VER) {
    localStorage.removeItem(LS_KEY);
    localStorage.setItem(LS_VER_KEY, CACHE_VER);
    console.log('Cache cleared: version updated to', CACHE_VER);
  }

  // キャッシュがあれば即座に表示（体感速度改善）
  const lsData = loadFromLS();
  if (lsData && lsData.length > 0) {
    cachedData = lsData;
    renderList(cachedData);
  }
  // 常にGASから最新データを取得してlocalStorageを上書き
  fetchAndRender();
</script>
</body>
