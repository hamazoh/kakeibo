<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家計簿メモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 16px;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── プルトゥリフレッシュ ── */
    .ptr-bar {
      position: fixed;
      top: 0; left: 0; width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #888;
      background: #e8f0fb;
      transform: translateY(-100%);
      transition: transform 0.2s ease;
      z-index: 50;
      pointer-events: none;
      user-select: none;
    }
    .ptr-bar.show  { transform: translateY(0); }
    .ptr-bar.ready { color: #185FA5; font-weight: 600; }

    /* ── レイアウト ── */
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #185FA5;
      margin-bottom: 16px;
    }

    /* ── カード ── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── フォーム ── */
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%; height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      background: #fafafa;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }
    .field input:focus { border-color: #185FA5; background: #fff; }

    /* ── ボタン ── */
    .btn-primary {
      width: 100%; height: 48px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    .btn-primary:active { opacity: 0.82; }

    .btn-outline {
      width: 100%; height: 48px;
      background: #fff;
      color: #185FA5;
      border: 2px solid #185FA5;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-outline:active { background: #e8f0fb; }

    /* ── リスト ── */
    .list-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }

    .empty {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-size: 12px;
      color: #888;
      font-weight: 600;
      text-align: left;
      padding: 0 4px 8px;
      border-bottom: 1px solid #eee;
    }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 10px 4px; font-size: 15px; vertical-align: top; }

    .td-date { white-space: nowrap; color: #555; font-size: 13px; }
    .td-amount { text-align: right; white-space: nowrap; }
    .amount-sum { font-weight: 600; }
    .amount-detail { font-size: 11px; color: #999; margin-top: 2px; word-break: break-all; }
    .td-item { width: 99%; }
    .item-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 10px;
      padding: 1px 7px;
      white-space: nowrap;
      font-weight: 600;
    }

    .td-acts { white-space: nowrap; vertical-align: middle; }

    .btn-icon {
      background: none;
      border: none;
      color: #bbb;
      font-size: 16px;
      cursor: pointer;
      padding: 6px 5px;
      border-radius: 4px;
      display: block;
      line-height: 1;
    }
    .btn-icon:active { color: #444; }

    .total-row {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #eee;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .total-label  { font-size: 15px; color: #555; font-weight: 600; }
    .total-amount { font-size: 20px; font-weight: 700; color: #185FA5; }

    /* ── ローディング ── */
    .loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.72);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .loading.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #ddd;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── オーバーレイ & ダイアログ ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: flex-start;
      justify-content: center;
      padding-top: 100px;
      z-index: 150;
    }
    .overlay.show { display: flex; }

    .dialog {
      background: #fff;
      border-radius: 14px;
      padding: 24px 20px 20px;
      width: calc(100% - 48px);
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .dialog h2 { font-size: 17px; font-weight: 700; margin-bottom: 12px; color: #222; }
    .dialog-text { font-size: 14px; color: #444; margin-bottom: 8px; line-height: 1.6; }
    .dialog-warn { font-size: 13px; color: #b00; margin-bottom: 20px; }
    .dialog .field { margin-bottom: 12px; }
    .dialog .field:last-of-type { margin-bottom: 16px; }

    .dialog-btns { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1; height: 46px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-danger {
      flex: 1; height: 46px;
      background: #A32D2D;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-danger:active { opacity: 0.85; }

    /* 編集ダイアログの保存ボタン */
    #edit-save {
      flex: 1; height: 46px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #edit-save:active { opacity: 0.82; }

    /* ── トースト ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.88);
      color: #fff;
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 300;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- プルトゥリフレッシュバー -->
<div class="ptr-bar" id="ptr-bar">↓ 引っ張って更新</div>

<div class="wrap">
  <h1>家計簿メモ</h1>

  <!-- 入力フォーム -->
  <div class="card">
    <div class="field">
      <label for="f-date">日付</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label for="f-amount">金額（円）</label>
      <input type="number" id="f-amount" inputmode="numeric" min="1" placeholder="例: 800">
    </div>
    <div class="field" style="margin-bottom:12px">
      <label for="f-item">項目</label>
      <input type="text" id="f-item" placeholder="例: 昼飯">
    </div>
    <button class="btn-primary" id="btn-add">追加する</button>
  </div>

  <!-- 記録一覧 -->
  <div class="card">
    <div class="list-title">記録一覧</div>
    <div id="list-area"></div>
    <div id="total-area"></div>
  </div>

  <!-- エクセル用コピーボタン -->
  <button class="btn-outline" id="btn-copy">エクセル用コピー</button>
</div>

<!-- ローディング -->
<div class="loading" id="loading"><div class="spinner"></div></div>

<!-- 削除確認ダイアログ -->
<div class="overlay" id="del-overlay">
  <div class="dialog">
    <h2>削除の確認</h2>
    <p class="dialog-text" id="del-msg"></p>
    <p class="dialog-warn">この操作は元に戻せません。</p>
    <div class="dialog-btns">
      <button class="btn-cancel" id="del-cancel">キャンセル</button>
      <button class="btn-danger" id="del-confirm">削除</button>
    </div>
  </div>
</div>

<!-- 編集ダイアログ -->
<div class="overlay" id="edit-overlay">
  <div class="dialog">
    <h2>編集</h2>
    <div class="field">
      <label for="e-date">日付</label>
      <input type="date" id="e-date">
    </div>
    <div class="field">
      <label for="e-amount">金額（円）</label>
      <input type="number" id="e-amount" inputmode="numeric" min="1">
    </div>
    <div class="field">
      <label for="e-item">項目</label>
      <input type="text" id="e-item">
    </div>
    <div class="dialog-btns">
      <button class="btn-cancel" id="edit-cancel">キャンセル</button>
      <button id="edit-save">保存</button>
    </div>
  </div>
</div>

<!-- コピー&全削除ダイアログ -->
<div class="overlay" id="copy-overlay">
  <div class="dialog">
    <h2>エクセル用コピーして削除</h2>
    <p class="dialog-text" id="copy-msg"></p>
    <p class="dialog-warn">この操作は元に戻せません。</p>
    <div class="dialog-btns">
      <button class="btn-cancel" id="copy-cancel">キャンセル</button>
      <button class="btn-danger" id="copy-confirm">コピーして削除</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
  'use strict';

  const API_URL = 'https://script.google.com/macros/s/AKfycbycNsvJQ9KZkEp22_dySkuUDuaBDEE7wFReKE7mUC_qti_Cj929-82Huj32RN6IbDxZuA/exec';

  // ── JSONP ──────────────────────────────────────────────────────────────────
  function jsonpCall(params, onSuccess, onError) {
    const cbName = 'cb_' + Date.now();
    let done = false;

    const timer = setTimeout(function () {
      if (done) return;
      done = true;
      cleanup();
      if (onError) onError(new Error('タイムアウト（10秒）'));
    }, 10000);

    function cleanup() {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
    }

    window[cbName] = function (data) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      onSuccess(data);
    };

    const qs = Object.keys(params)
      .map(function (k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
      .concat('callback=' + cbName)
      .join('&');

    const s = document.createElement('script');
    s.id  = cbName;
    s.src = API_URL + '?' + qs;
    s.onerror = function () {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      if (onError) onError(new Error('通信エラー'));
    };
    document.body.appendChild(s);
  }

  // ── UI ヘルパー ─────────────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('loading').classList.toggle('show', on);
  }

  function openOverlay(id)  { document.getElementById(id).classList.add('show'); }
  function closeOverlay(id) { document.getElementById(id).classList.remove('show'); }

  let _toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2500);
  }

  // ── 汎用ヘルパー ────────────────────────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function fmtDate(s) {
    // "YYYY-MM-DD" → "M月D日"
    const p = s.split('-');
    return parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── 日付正規化 ──────────────────────────────────────────────────────────────
  // GASは Date.toString() 形式 "Mon Mar 23 2026 00:00:00 GMT+0900 (日本標準時)" で返す
  function normalizeDate(val) {
    const s = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d{4}-\d{2}-\d{2}T/.test(s)) return s.slice(0, 10);
    if (/^\d{4}\/\d{2}\/\d{2}/.test(s)) return s.slice(0, 10).replace(/\//g, '-');

    // Date.toString() 形式: タイムゾーン offset を使って正確に変換
    const d = new Date(s);
    if (isNaN(d.getTime())) return null;
    const tz = s.match(/GMT([+-])(\d{2})(\d{2})/);
    if (tz) {
      const off = (tz[1] === '+' ? 1 : -1) * (parseInt(tz[2]) * 60 + parseInt(tz[3]));
      const adj = new Date(d.getTime() + off * 60000);
      return adj.getUTCFullYear() + '-' +
        String(adj.getUTCMonth() + 1).padStart(2, '0') + '-' +
        String(adj.getUTCDate()).padStart(2, '0');
    }
    // fallback: ローカル時刻
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  // ── parseRows ──────────────────────────────────────────────────────────────
  // GAS 形式: [ [date, item, amount], ... ]  ← 1行1金額
  // 同月・同項目をマージして表示用データを作る
  function parseRows(raw) {
    if (!Array.isArray(raw)) return [];
    const map   = {};
    const order = [];

    raw.forEach(function (row) {
      if (!Array.isArray(row) || row.length < 3) return;

      const date = normalizeDate(row[0]);
      if (!date) return;

      const item   = String(row[1]).trim();
      if (!item) return;

      const amount = parseInt(row[2], 10);
      if (isNaN(amount) || amount <= 0) return;

      const key = date.slice(0, 7) + '_' + item; // "YYYY-MM_項目名"
      if (map[key]) {
        map[key].amounts.push(amount);
      } else {
        map[key] = { key: key, date: date, item: item, amounts: [amount] };
        order.push(key);
      }
    });

    return order.map(function (k) { return map[k]; });
  }

  // ── 描画 ───────────────────────────────────────────────────────────────────
  let currentData = [];

  function renderList(data) {
    currentData = data;
    const listArea  = document.getElementById('list-area');
    const totalArea = document.getElementById('total-area');

    if (!data.length) {
      listArea.innerHTML  = '<p class="empty">まだデータがありません</p>';
      totalArea.innerHTML = '';
      return;
    }

    let total = 0;
    let rows  = '';

    data.forEach(function (r) {
      const sum = r.amounts.reduce(function (a, b) { return a + b; }, 0);
      total += sum;

      const detail = r.amounts.length >= 2
        ? '<div class="amount-detail">' + r.amounts.map(function (a) { return '¥' + a.toLocaleString(); }).join('+') + '</div>'
        : '';
      const badge = r.amounts.length >= 2
        ? '<span class="badge">' + r.amounts.length + '件</span>'
        : '';

      rows += '<tr>' +
        '<td class="td-date">'   + fmtDate(r.date) + '</td>' +
        '<td class="td-amount"><div class="amount-sum">¥' + sum.toLocaleString() + '</div>' + detail + '</td>' +
        '<td class="td-item"><div class="item-wrap">' + esc(r.item) + badge + '</div></td>' +
        '<td class="td-acts">' +
          '<button class="btn-icon btn-edit-row" data-key="' + esc(r.key) + '" aria-label="編集">✏</button>' +
          '<button class="btn-icon btn-del-row"  data-date="' + esc(r.date) + '" data-item="' + esc(r.item) + '" aria-label="削除">✕</button>' +
        '</td>' +
        '</tr>';
    });

    listArea.innerHTML =
      '<table>' +
        '<thead><tr>' +
          '<th>日付</th>' +
          '<th style="text-align:right">金額</th>' +
          '<th>項目</th>' +
          '<th></th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';

    totalArea.innerHTML =
      '<div class="total-row">' +
        '<span class="total-label">合計</span>' +
        '<span class="total-amount">¥' + total.toLocaleString() + '</span>' +
      '</div>';

    listArea.querySelectorAll('.btn-edit-row').forEach(function (btn) {
      btn.addEventListener('click', function () { startEdit(btn.dataset.key); });
    });
    listArea.querySelectorAll('.btn-del-row').forEach(function (btn) {
      btn.addEventListener('click', function () { askDelete(btn.dataset.date, btn.dataset.item); });
    });
  }

  // ── データ取得 ─────────────────────────────────────────────────────────────
  function loadData() {
    setLoading(true);
    jsonpCall({ action: 'get' }, function (raw) {
      setLoading(false);
      renderList(parseRows(raw));
    }, function (err) {
      setLoading(false);
      showToast('データ取得失敗: ' + err.message);
    });
  }

  // ── 追加 ───────────────────────────────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', function () {
    const date   = document.getElementById('f-date').value;
    const amount = parseInt(document.getElementById('f-amount').value, 10);
    const item   = document.getElementById('f-item').value.trim();

    if (!date)                { showToast('日付を入力してください'); return; }
    if (!amount || amount <= 0){ showToast('正しい金額を入力してください'); return; }
    if (!item)                { showToast('項目を入力してください'); return; }

    setLoading(true);
    jsonpCall(
      { action: 'add', date: date, item: item, amounts: String(amount) },
      function () {
        document.getElementById('f-amount').value = '';
        document.getElementById('f-item').value   = '';
        document.getElementById('f-amount').focus();
        loadData();
      },
      function (err) {
        setLoading(false);
        showToast('保存失敗: ' + err.message);
      }
    );
  });

  ['f-amount', 'f-item'].forEach(function (id) {
    document.getElementById(id).addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
  });

  // ── 削除 ───────────────────────────────────────────────────────────────────
  let pendingDel = null;

  function askDelete(date, item) {
    pendingDel = { date: date, item: item };
    document.getElementById('del-msg').textContent = '「' + item + '」を削除しますか？';
    openOverlay('del-overlay');
  }

  document.getElementById('del-cancel').addEventListener('click', function () {
    closeOverlay('del-overlay');
    pendingDel = null;
  });

  document.getElementById('del-confirm').addEventListener('click', function () {
    if (!pendingDel) return;
    const date = pendingDel.date;
    const item = pendingDel.item;
    pendingDel = null;
    closeOverlay('del-overlay');

    setLoading(true);
    jsonpCall(
      { action: 'delete', date: date, item: item },
      function () { loadData(); },
      function (err) {
        setLoading(false);
        showToast('削除失敗: ' + err.message);
      }
    );
  });

  // ── 編集 ───────────────────────────────────────────────────────────────────
  let editingKey = null;

  function startEdit(key) {
    const r = currentData.find(function (d) { return d.key === key; });
    if (!r) return;
    editingKey = key;
    document.getElementById('e-date').value   = r.date;
    document.getElementById('e-amount').value = r.amounts.reduce(function (a, b) { return a + b; }, 0);
    document.getElementById('e-item').value   = r.item;
    openOverlay('edit-overlay');
  }

  document.getElementById('edit-cancel').addEventListener('click', function () {
    closeOverlay('edit-overlay');
    editingKey = null;
  });

  document.getElementById('edit-save').addEventListener('click', function () {
    if (!editingKey) return;
    const r = currentData.find(function (d) { return d.key === editingKey; });
    if (!r) return;

    const newDate   = document.getElementById('e-date').value;
    const newAmount = parseInt(document.getElementById('e-amount').value, 10);
    const newItem   = document.getElementById('e-item').value.trim();

    if (!newDate)                 { showToast('日付を入力してください'); return; }
    if (!newAmount || newAmount <= 0){ showToast('正しい金額を入力してください'); return; }
    if (!newItem)                 { showToast('項目を入力してください'); return; }

    const oldDate = r.date;
    const oldItem = r.item;
    closeOverlay('edit-overlay');
    editingKey = null;

    setLoading(true);
    // Step1: 旧データ削除
    jsonpCall(
      { action: 'delete', date: oldDate, item: oldItem },
      function () {
        // Step2: 新データ追加
        jsonpCall(
          { action: 'add', date: newDate, item: newItem, amounts: String(newAmount) },
          function () {
            showToast('更新しました');
            loadData();
          },
          function (err) {
            setLoading(false);
            showToast('追加失敗: ' + err.message);
          }
        );
      },
      function (err) {
        setLoading(false);
        showToast('削除失敗: ' + err.message);
      }
    );
  });

  // ── コピー & 全削除 ────────────────────────────────────────────────────────
  document.getElementById('btn-copy').addEventListener('click', function () {
    if (!currentData.length) { showToast('データがありません'); return; }
    const total = currentData.reduce(function (s, r) {
      return s + r.amounts.reduce(function (a, b) { return a + b; }, 0);
    }, 0);
    document.getElementById('copy-msg').textContent =
      currentData.length + '件・合計 ¥' + total.toLocaleString() + ' をコピーします。';
    openOverlay('copy-overlay');
  });

  document.getElementById('copy-cancel').addEventListener('click', function () {
    closeOverlay('copy-overlay');
  });

  document.getElementById('copy-confirm').addEventListener('click', function () {
    const tsv = currentData.map(function (r) {
      const sum = r.amounts.reduce(function (a, b) { return a + b; }, 0);
      return fmtDate(r.date) + '\t¥' + sum.toLocaleString() + '\t' + r.item;
    }).join('\n');

    closeOverlay('copy-overlay');

    copyText(tsv).then(function () {
      setLoading(true);
      jsonpCall(
        { action: 'clear' },
        function () {
          showToast('コピーして削除しました');
          loadData();
        },
        function (err) {
          setLoading(false);
          showToast('削除失敗: ' + err.message);
        }
      );
    }).catch(function () {
      showToast('クリップボードへのコピーに失敗しました');
    });
  });

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function (resolve, reject) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy') ? resolve() : reject(new Error('copy failed'));
      ta.remove();
    });
  }

  // ── オーバーレイ背景タップで閉じる ────────────────────────────────────────
  ['del-overlay', 'edit-overlay', 'copy-overlay'].forEach(function (id) {
    document.getElementById(id).addEventListener('click', function (e) {
      if (e.target === e.currentTarget) {
        closeOverlay(id);
        if (id === 'del-overlay')  pendingDel  = null;
        if (id === 'edit-overlay') editingKey  = null;
      }
    });
  });

  // ── プルトゥリフレッシュ ───────────────────────────────────────────────────
  (function () {
    const bar = document.getElementById('ptr-bar');
    const THRESHOLD = 72;
    let startY = 0, tracking = false, triggered = false, refreshing = false;

    document.addEventListener('touchstart', function (e) {
      if (window.scrollY !== 0 || refreshing) return;
      if (e.target.closest('input, button, .overlay')) return;
      startY   = e.touches[0].clientY;
      tracking = true;
      triggered = false;
    }, { passive: true });

    document.addEventListener('touchmove', function (e) {
      if (!tracking || refreshing) return;
      const delta = e.touches[0].clientY - startY;
      if (delta <= 0) { bar.classList.remove('show', 'ready'); return; }
      bar.classList.add('show');
      if (delta >= THRESHOLD) {
        bar.textContent = '↑ 離して更新';
        bar.classList.add('ready');
        triggered = true;
      } else {
        bar.textContent = '↓ 引っ張って更新';
        bar.classList.remove('ready');
        triggered = false;
      }
    }, { passive: true });

    document.addEventListener('touchend', function () {
      if (!tracking) return;
      tracking = false;
      if (!triggered) { bar.classList.remove('show', 'ready'); return; }

      refreshing = true;
      bar.textContent = '更新中...';
      bar.classList.remove('ready');
      setLoading(true);

      jsonpCall({ action: 'get' }, function (raw) {
        setLoading(false);
        renderList(parseRows(raw));
        done();
      }, function (err) {
        setLoading(false);
        showToast('更新失敗: ' + err.message);
        done();
      });

      function done() {
        refreshing = false;
        triggered  = false;
        bar.classList.remove('show', 'ready');
        bar.textContent = '↓ 引っ張って更新';
      }
    }, { passive: true });
  })();

  // ── 初期化 ─────────────────────────────────────────────────────────────────
  document.getElementById('f-date').value = todayStr();
  loadData();
</script>
</body>
</html>
