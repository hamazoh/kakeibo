<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家計簿メモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 16px;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #185FA5;
    }

    /* フォーム */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      color: #555;
      margin-bottom: 2px;
      display: block;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      background: #fafafa;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    input:focus {
      border-color: #185FA5;
      background: #fff;
    }

    .btn-add {
      width: 100%;
      height: 48px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .btn-add:active { opacity: 0.85; }

    /* リスト */
    .list-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .list-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .empty-msg {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 24px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 12px;
      color: #888;
      font-weight: 600;
      text-align: left;
      padding: 0 6px 8px;
      border-bottom: 1px solid #eee;
    }

    thead th:last-child { width: 28px; text-align: center; }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 10px 6px;
      vertical-align: top;
      font-size: 15px;
    }

    .td-date { white-space: nowrap; color: #555; font-size: 14px; }

    .td-amount { text-align: right; white-space: nowrap; }

    .amount-total { font-weight: 600; }

    .amount-detail {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
      word-break: break-all;
    }

    .td-item { width: 99%; }

    .item-name { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 10px;
      padding: 1px 7px;
      white-space: nowrap;
      font-weight: 600;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #bbb;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      border-radius: 4px;
    }

    .btn-delete:active { color: #e33; }

    .total-row {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #eee;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .total-label { color: #555; font-weight: 600; }

    .total-amount { color: #185FA5; font-size: 20px; }

    /* コピーボタン */
    .btn-copy {
      width: 100%;
      height: 48px;
      background: #fff;
      color: #185FA5;
      border: 2px solid #185FA5;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-copy:active { background: #e8f0fb; }

    /* オーバーレイ＆ダイアログ */
    .overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      min-height: 100%;
      background: rgba(0,0,0,0.45);
      justify-content: center;
      align-items: flex-start;
      padding-top: 120px;
      z-index: 100;
    }

    .overlay.active { display: flex; }

    .dialog {
      background: #fff;
      border-radius: 14px;
      padding: 24px 20px 20px;
      width: calc(100% - 48px);
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .dialog h2 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #222;
    }

    .dialog-info {
      font-size: 14px;
      color: #444;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .dialog-warn {
      font-size: 13px;
      color: #b00;
      margin-bottom: 20px;
    }

    .dialog-btns {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      height: 46px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm-delete {
      flex: 1;
      height: 46px;
      background: #A32D2D;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm-delete:active { opacity: 0.85; }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.88);
      color: #fff;
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 200;
    }

    .toast.show { opacity: 1; }

    /* ラッパー（overlayのposition: absoluteの基準） */
    #app {
      position: relative;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="container">
    <h1>家計簿メモ</h1>

    <!-- 入力フォーム -->
    <div class="form-card">
      <div class="form-row">
        <div>
          <label for="input-date">日付</label>
          <input type="date" id="input-date">
        </div>
        <div>
          <label for="input-amount">支出（円）</label>
          <input type="number" id="input-amount" inputmode="numeric" min="1" placeholder="例: 800">
        </div>
        <div>
          <label for="input-item">項目</label>
          <input type="text" id="input-item" placeholder="例: 昼飯">
        </div>
      </div>
      <button class="btn-add" id="btn-add">追加する</button>
    </div>

    <!-- リスト -->
    <div class="list-card">
      <div class="list-header">
        <span class="list-title">記録一覧</span>
      </div>
      <div id="list-area"></div>
      <div id="total-area"></div>
    </div>

    <!-- コピーボタン -->
    <button class="btn-copy" id="btn-copy">エクセル用コピー</button>
  </div>

  <!-- 確認ダイアログ -->
  <div class="overlay" id="overlay">
    <div class="dialog">
      <h2>エクセル用コピーして削除</h2>
      <p class="dialog-info" id="dialog-info"></p>
      <p class="dialog-warn">この操作は元に戻せません。</p>
      <div class="dialog-btns">
        <button class="btn-cancel" id="btn-cancel">キャンセル</button>
        <button class="btn-confirm-delete" id="btn-confirm-delete">コピーして削除</button>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'kakeibo_v1';

  // --- データ操作 ---
  function loadData() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // マージキー: "YYYY-MM_項目名"
  function mergeKey(dateStr, item) {
    return dateStr.slice(0, 7) + '_' + item.trim();
  }

  // --- 日付フォーマット ---
  function formatDate(dateStr) {
    // "2026-03-22" → "3月22日"
    const [, m, d] = dateStr.split('-');
    return `${parseInt(m)}月${parseInt(d)}日`;
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // --- UI ---
  function renderList() {
    const data = loadData();
    const listArea = document.getElementById('list-area');
    const totalArea = document.getElementById('total-area');

    if (data.length === 0) {
      listArea.innerHTML = '<p class="empty-msg">まだデータがありません</p>';
      totalArea.innerHTML = '';
      return;
    }

    let total = 0;
    let rows = '';

    data.forEach((row, idx) => {
      const sum = row.amounts.reduce((a, b) => a + b, 0);
      total += sum;

      const detailHtml = row.amounts.length >= 2
        ? `<div class="amount-detail">${row.amounts.map(a => '¥' + a.toLocaleString()).join('+')}</div>`
        : '';

      const badgeHtml = row.amounts.length >= 2
        ? `<span class="badge">${row.amounts.length}件</span>`
        : '';

      rows += `
        <tr>
          <td class="td-date">${formatDate(row.date)}</td>
          <td class="td-amount">
            <div class="amount-total">¥${sum.toLocaleString()}</div>
            ${detailHtml}
          </td>
          <td class="td-item">
            <div class="item-name">${escHtml(row.item)}${badgeHtml}</div>
          </td>
          <td>
            <button class="btn-delete" data-idx="${idx}" aria-label="削除">✕</button>
          </td>
        </tr>`;
    });

    listArea.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>日付</th>
            <th style="text-align:right">支出</th>
            <th>項目</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    totalArea.innerHTML = `
      <div class="total-row">
        <span class="total-label">合計</span>
        <span class="total-amount">¥${total.toLocaleString()}</span>
      </div>`;

    // 削除ボタンイベント
    listArea.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const data = loadData();
        data.splice(idx, 1);
        saveData(data);
        renderList();
      });
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- トースト ---
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // --- 追加 ---
  document.getElementById('btn-add').addEventListener('click', () => {
    const dateEl = document.getElementById('input-date');
    const amountEl = document.getElementById('input-amount');
    const itemEl = document.getElementById('input-item');

    const dateVal = dateEl.value;
    const amountVal = parseInt(amountEl.value);
    const itemVal = itemEl.value.trim();

    if (!dateVal) { showToast('日付を入力してください'); return; }
    if (!amountVal || amountVal <= 0) { showToast('正しい金額を入力してください'); return; }
    if (!itemVal) { showToast('項目を入力してください'); return; }

    const data = loadData();
    const key = mergeKey(dateVal, itemVal);
    const existIdx = data.findIndex(r => r.key === key);

    if (existIdx >= 0) {
      data[existIdx].amounts.push(amountVal);
      saveData(data);
      renderList();
      showToast(`「${itemVal}」にマージしました`);
    } else {
      data.push({ key, date: dateVal, item: itemVal, amounts: [amountVal] });
      saveData(data);
      renderList();
    }

    amountEl.value = '';
    itemEl.value = '';
    // 日付はそのままにする（連続入力時の利便性）
    amountEl.focus();
  });

  // Enterキーで追加
  ['input-amount', 'input-item'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-add').click();
    });
  });

  // --- コピーダイアログ ---
  document.getElementById('btn-copy').addEventListener('click', () => {
    const data = loadData();
    if (data.length === 0) { showToast('データがありません'); return; }

    const total = data.reduce((s, r) => s + r.amounts.reduce((a, b) => a + b, 0), 0);
    document.getElementById('dialog-info').textContent =
      `${data.length}件・合計 ¥${total.toLocaleString()} をコピーします。`;
    document.getElementById('overlay').classList.add('active');
  });

  document.getElementById('btn-cancel').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('active');
  });

  document.getElementById('btn-confirm-delete').addEventListener('click', () => {
    const data = loadData();
    const tsv = data.map(r => {
      const sum = r.amounts.reduce((a, b) => a + b, 0);
      return `${formatDate(r.date)}\t¥${sum.toLocaleString()}\t${r.item}`;
    }).join('\n');

    copyToClipboard(tsv).then(() => {
      localStorage.removeItem(STORAGE_KEY);
      renderList();
      document.getElementById('overlay').classList.remove('active');
      showToast('コピーして削除しました');
    }).catch(() => {
      showToast('コピーに失敗しました');
      document.getElementById('overlay').classList.remove('active');
    });
  });

  // オーバーレイ外クリックで閉じる
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('active');
    }
  });

  // --- クリップボード ---
  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    // フォールバック
    return new Promise((resolve, reject) => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      ok ? resolve() : reject(new Error('execCommand failed'));
    });
  }

  // --- 初期化 ---
  document.getElementById('input-date').value = todayStr();
  renderList();
</script>
</body>
</html>
